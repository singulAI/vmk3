<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VITOR — Entrada</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;cursor:none}

canvas{position:fixed;inset:0;width:100%;height:100%;display:block}

.cursor{
  position:fixed;width:14px;height:14px;
  background:#CCFF00;border-radius:50%;
  pointer-events:none;z-index:200;
  transform:translate(-50%,-50%);
  transition:transform .1s;
  mix-blend-mode:screen;
}
.cursor-dot{
  position:fixed;width:4px;height:4px;
  background:#fff;border-radius:50%;
  pointer-events:none;z-index:201;
  transform:translate(-50%,-50%);
}

.ui{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:4rem 4vw 5rem;
  pointer-events:none;
}

.ui-logo{
  position:absolute;top:2rem;left:4vw;
  display:flex;align-items:center;gap:.75rem;
  pointer-events:auto;
}
.ui-logo img{width:40px;height:40px;object-fit:contain}

.ui-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;
}
.ui-hint p{
  font-family:'Space Mono',monospace;
  font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;
  color:rgba(255,255,255,.35);
  animation:pulse 2.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:.7}}

.ui-bottom{display:flex;justify-content:space-between;align-items:flex-end;gap:2rem}

.ui-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(5rem,18vw,14rem);
  line-height:.85;
  color:#fff;
  letter-spacing:-.01em;
  text-shadow: 0 0 80px rgba(204,255,0,.3);
}
.ui-name em{color:#CCFF00;font-style:normal}

.ui-right{
  display:flex;flex-direction:column;align-items:flex-end;gap:1.5rem;
  padding-bottom:.5rem;
  pointer-events:auto;
}
.ui-title{
  font-family:'Space Mono',monospace;
  font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.5);text-align:right;line-height:1.8;
}
.enter-btn{
  font-family:'Space Mono',monospace;
  font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;
  padding:1rem 2.5rem;
  background:#CCFF00;color:#000;
  border:none;cursor:none;
  position:relative;overflow:hidden;
  transition:box-shadow .3s;
  text-decoration:none;display:inline-block;
}
.enter-btn::before{
  content:'';position:absolute;inset:0;
  background:#fff;transform:translateX(-100%);
  transition:transform .4s cubic-bezier(.4,0,.2,1);
}
.enter-btn:hover::before{transform:translateX(0)}
.enter-btn:hover{box-shadow:0 0 40px rgba(204,255,0,.5);}
.enter-btn span{position:relative;z-index:1}

.vignette{
  position:fixed;inset:0;z-index:50;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 70% at 50% 100%, rgba(0,0,0,.85) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,0,0,.7) 0%, transparent 60%);
}

.line-left{
  position:fixed;left:4vw;top:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(204,255,0,.15) 40%,rgba(204,255,0,.15) 60%,transparent);
  z-index:50;pointer-events:none;
}
.line-right{
  position:fixed;right:4vw;top:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(255,255,255,.06) 40%,rgba(255,255,255,.06) 60%,transparent);
  z-index:50;pointer-events:none;
}

.counter{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.3em;
  color:rgba(255,255,255,.2);z-index:100;pointer-events:none;
}

/* Fade in */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ui{animation:fadeIn 1.5s ease forwards}

/* Touch ripple */
.touch-ripple{
  position:fixed;pointer-events:none;z-index:150;
  border-radius:50%;border:1px solid #CCFF00;
  transform:translate(-50%,-50%) scale(0);
  animation:rippleOut .6s ease forwards;
}
@keyframes rippleOut{
  to{transform:translate(-50%,-50%) scale(3);opacity:0}
}
</style>
</head>

// Also make a grayscale offscreen canvas
let grayCanvas, grayCtx, colorCanvas, colorCtx;

img.onload = () => {
  // Create grayscale version
  grayCanvas = document.createElement('canvas');
  grayCanvas.width = img.width;
  grayCanvas.height = img.height;
  grayCtx = grayCanvas.getContext('2d');
  grayCtx.filter = 'grayscale(1) brightness(0.75)';
  grayCtx.drawImage(img, 0, 0);

  // Color version (with slight tint)
  colorCanvas = document.createElement('canvas');
  colorCanvas.width = img.width;
  colorCanvas.height = img.height;
  colorCtx = colorCanvas.getContext('2d');
  colorCtx.drawImage(img, 0, 0);

  loop();
};

// Trail
const trail = [];
const DURATION = 1200; // ms
const MAX_RADIUS = 110;
const MIN_RADIUS = 60;

let mx = -999, my = -999;

function addPoint(x, y) {
  trail.push({ x, y, t: Date.now(), id: Math.random() });
  if (trail.length > 300) trail.shift();
}

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  // throttle point addition
  const last = trail[trail.length - 1];
  if (!last || Math.hypot(e.clientX - last.x, e.clientY - last.y) > 6) {
    addPoint(e.clientX, e.clientY);
  }
});

// Touch support
document.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mx = t.clientX; my = t.clientY;
  const last = trail[trail.length - 1];
  if (!last || Math.hypot(t.clientX - last.x, t.clientY - last.y) > 6) {
    addPoint(t.clientX, t.clientY);
  }
}, {passive:false});

document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  // ripple
  const r = document.createElement('div');
  r.className = 'touch-ripple';
  r.style.left = t.clientX + 'px';
  r.style.top = t.clientY + 'px';
  r.style.width = r.style.height = (MAX_RADIUS*2) + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 700);
});

// Image cover helper
function coverRect(src, dx, dy, dw, dh) {
  const iw = src.width, ih = src.height;
  const da = dw / dh, ia = iw / ih;
  let sx, sy, sw, sh;
  if (ia > da) {
    sh = ih; sw = ih * da;
    sx = (iw - sw) / 2; sy = 0;
  } else {
    sw = iw; sh = iw / da;
    sx = 0; sy = (ih - sh) / 2;
  }
  ctx.drawImage(src, sx, sy, sw, sh, dx, dy, dw, dh);
}

function loop() {
  const now = Date.now();

  ctx.clearRect(0, 0, W, H);

  // Base: grayscale
  if (grayCanvas) coverRect(grayCanvas, 0, 0, W, H);

  // Color trail
  const alive = trail.filter(p => now - p.t < DURATION);

  alive.forEach((pt, i) => {
    const age = now - pt.t;
    const progress = age / DURATION;
    const alpha = Math.pow(1 - progress, 1.8);
    const radius = MIN_RADIUS + (MAX_RADIUS - MIN_RADIUS) * (1 - progress * 0.4);

    if (alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, radius, 0, Math.PI * 2);
    ctx.clip();
    if (colorCanvas) coverRect(colorCanvas, 0, 0, W, H);
    ctx.restore();
  });

  // Slight yellow glow at current cursor
  if (mx > 0 && my > 0 && alive.length > 0) {
    const grad = ctx.createRadialGradient(mx, my, 0, mx, my, 50);
    grad.addColorStop(0, 'rgba(204,255,0,0.08)');
    grad.addColorStop(1, 'transparent');
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(mx, my, 50, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  requestAnimationFrame(loop);
}

// Cursor
const cursor = document.getElementById('cursor');
const cdot = document.getElementById('cdot');
let cx=0,cy=0;
document.addEventListener('mousemove', e => {
  cx = e.clientX; cy = e.clientY;
  cursor.style.left = cx + 'px';
  cursor.style.top = cy + 'px';
  cdot.style.left = cx + 'px';
  cdot.style.top = cy + 'px';
});
document.querySelectorAll('a,.enter-btn').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.width = '40px';
    cursor.style.height = '40px';
    cursor.style.opacity = '.5';
  });
  el.addEventListener('mouseleave', () => {
    cursor.style.width = '14px';
    cursor.style.height = '14px';
    cursor.style.opacity = '1';
  });
});

// Hide hint after first move
let hintHidden = false;
document.addEventListener('mousemove', () => {
  if (!hintHidden) {
    document.querySelector('.ui-hint').style.opacity = '0';
    document.querySelector('.ui-hint').style.transition = 'opacity 1s';
    hintHidden = true;
  }
});

// Inicializar AOS
if (typeof AOS !== 'undefined') {
  AOS.init({
    duration: 800,
    offset: 100,
    once: true
  });
}
</script>
</body>
